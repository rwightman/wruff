<svg width="740px" height="542px" xmlns="http://www.w3.org/2000/svg">
  <style>
    .fg { fill: #AAAAAA }
    .bg { fill: #000000 }
    .container {
      padding: 0 10px;
      line-height: 18px;
    }
    tspan {
      font: 14px SFMono-Regular, Consolas, Liberation Mono, Menlo, monospace;
      white-space: pre;
      line-height: 18px;
    }
  </style>

  <rect width="100%" height="100%" y="0" rx="4.5" class="bg" />

  <text xml:space="preserve" class="container fg">
    <tspan x="10px" y="28px"><tspan>error[E0308]: mismatched types</tspan>
</tspan>
    <tspan x="10px" y="46px"><tspan>  --&gt; src/format.rs:51:6</tspan>
</tspan>
    <tspan x="10px" y="64px"><tspan>   |</tspan>
</tspan>
    <tspan x="10px" y="82px"><tspan>51 |   ) -&gt; Option&lt;String&gt; {</tspan>
</tspan>
    <tspan x="10px" y="100px"><tspan>   |        -------------- expected `Option&lt;String&gt;` because of return type</tspan>
</tspan>
    <tspan x="10px" y="118px"><tspan>52 | /     for ann in annotations {</tspan>
</tspan>
    <tspan x="10px" y="136px"><tspan>53 | |         match (ann.range.0, ann.range.1) {</tspan>
</tspan>
    <tspan x="10px" y="154px"><tspan>54 | |             (None, None) =&gt; continue,</tspan>
</tspan>
    <tspan x="10px" y="172px"><tspan>55 | |             (Some(start), Some(end)) if start &gt; end_index =&gt; continue,</tspan>
</tspan>
    <tspan x="10px" y="190px"><tspan>56 | |             (Some(start), Some(end)) if start &gt;= start_index =&gt; {</tspan>
</tspan>
    <tspan x="10px" y="208px"><tspan>57 | |                 let label = if let Some(ref label) = ann.label {</tspan>
</tspan>
    <tspan x="10px" y="226px"><tspan>58 | |                     format!(" {}", label)</tspan>
</tspan>
    <tspan x="10px" y="244px"><tspan>59 | |                 } else {</tspan>
</tspan>
    <tspan x="10px" y="262px"><tspan>60 | |                     String::from("")</tspan>
</tspan>
    <tspan x="10px" y="280px"><tspan>61 | |                 };</tspan>
</tspan>
    <tspan x="10px" y="298px"><tspan>62 | |</tspan>
</tspan>
    <tspan x="10px" y="316px"><tspan>63 | |                 return Some(format!(</tspan>
</tspan>
    <tspan x="10px" y="334px"><tspan>64 | |                     "{}{}{}",</tspan>
</tspan>
    <tspan x="10px" y="352px"><tspan>65 | |                     " ".repeat(start - start_index),</tspan>
</tspan>
    <tspan x="10px" y="370px"><tspan>66 | |                     "^".repeat(end - start),</tspan>
</tspan>
    <tspan x="10px" y="388px"><tspan>67 | |                     label</tspan>
</tspan>
    <tspan x="10px" y="406px"><tspan>68 | |                 ));</tspan>
</tspan>
    <tspan x="10px" y="424px"><tspan>69 | |             }</tspan>
</tspan>
    <tspan x="10px" y="442px"><tspan>70 | |             _ =&gt; continue,</tspan>
</tspan>
    <tspan x="10px" y="460px"><tspan>71 | |         }</tspan>
</tspan>
    <tspan x="10px" y="478px"><tspan>72 | |     }</tspan>
</tspan>
    <tspan x="10px" y="496px"><tspan>   | |____^ expected enum `std::option::Option`</tspan>
</tspan>
    <tspan x="10px" y="514px"><tspan>   |</tspan>
</tspan>
    <tspan x="10px" y="532px">
</tspan>
  </text>

</svg>
